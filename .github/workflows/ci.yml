name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build platform-api
        run: npm run platform-api:build

      - name: Build context runtime
        run: npm run direct:build

      - name: Build console
        run: npm run console:build

      - name: Run tests
        run: npm run test:all

      - name: Security audit
        run: npm run security:check
        continue-on-error: true
