services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  platform-api:
    build:
      context: .
      dockerfile: apps/platform-api/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.example
      - configs/env/development.env
    environment:
      CLOUD_PROVIDER: local
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  direct-context-api:
    build:
      context: .
      dockerfile: services/direct-context.Dockerfile
    restart: unless-stopped
    ports:
      - "4300:4300"
    env_file:
      - .env.example
      - configs/env/development.env
    environment:
      DIRECT_PORT: 4300
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4300/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  direct-console:
    build:
      context: .
      dockerfile: apps/direct-console/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      platform-api:
        condition: service_healthy
      direct-context-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
