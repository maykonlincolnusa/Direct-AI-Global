location: eastus
name: direct-platform-api
type: Microsoft.App/containerApps
properties:
  managedEnvironmentId: /subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/Microsoft.App/managedEnvironments/<environment-name>
  configuration:
    ingress:
      external: true
      targetPort: 3000
      transport: auto
    secrets:
      - name: jwt-secret
        value: <set-in-pipeline-or-keyvault>
      - name: mongo-uri
        value: <set-in-pipeline-or-keyvault>
      - name: redis-url
        value: <set-in-pipeline-or-keyvault>
      - name: rabbitmq-url
        value: <set-in-pipeline-or-keyvault>
      - name: openrouter-api-key
        value: <set-in-pipeline-or-keyvault>
  template:
    revisionSuffix: v1
    containers:
      - name: platform-api
        image: <acr-name>.azurecr.io/direct-platform-api:latest
        resources:
          cpu: 1
          memory: 2Gi
        env:
          - name: NODE_ENV
            value: production
          - name: CLOUD_PROVIDER
            value: azure
          - name: PORT
            value: "3000"
          - name: APP_REGION
            value: US
          - name: LOG_LEVEL
            value: info
          - name: DEFAULT_LOCALE
            value: en-US
          - name: DEFAULT_CURRENCY
            value: USD
          - name: RATE_LIMIT_POINTS
            value: "1500"
          - name: RATE_LIMIT_WINDOW_MS
            value: "60000"
          - name: TOKEN_BUDGET_BASE
            value: "1200"
          - name: JWT_SECRET
            secretRef: jwt-secret
          - name: MONGO_URI
            secretRef: mongo-uri
          - name: REDIS_URL
            secretRef: redis-url
          - name: RABBITMQ_URL
            secretRef: rabbitmq-url
          - name: OPENROUTER_API_KEY
            secretRef: openrouter-api-key
    scale:
      minReplicas: 1
      maxReplicas: 10
